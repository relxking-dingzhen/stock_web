{% extends 'base.html' %}

{% block title %}小巴{% endblock %}

{% block head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}

{% block body %}
<div class="container mt-4">
    <!-- 聊天记录显示区域 -->
    <div id="chat-box" class="bg-light p-3 mb-3" style="height: 500px; overflow-y: auto; border-radius: 8px; border: 1px solid #ddd;">
        <div id="chat-messages">
            <!-- 显示历史聊天记录 -->
            {% for chat in chat_history %}
            <div class="message user-message mb-3">
                <div class="p-3 rounded shadow-sm">
                    <strong>你：</strong>
                    <p class="mb-0">{{ chat.message }}</p>
                </div>
            </div>
            <div class="message ai-message mb-3">
                <div class="p-3 rounded shadow-sm">
                    <strong>小巴：</strong>
                    <p class="mb-0">{{ chat.response }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    <!-- 输入区域 -->
    <div class="input-group mb-3">
        <input type="text" id="user-input" class="form-control" placeholder="请输入你的问题..." aria-label="消息输入框">
        <button class="btn btn-primary" type="button" onclick="sendMessage()">发送</button>
    </div>
</div>

<!-- 添加JavaScript -->
<script>

</script>
{% endblock %}
